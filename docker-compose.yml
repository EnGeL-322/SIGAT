services:
  mysql:
    image: mysql:8.0
    container_name: sigat_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: sigat_db
    ports:
      - "3307:3306"
    volumes:
      - sigat_mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./sigat
    container_name: sigat_backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sigat_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      # Correo para recuperacion de contrasena (opcional).
      # Si los dejas vacios, el codigo aparece en los logs (modo gratis).
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      # Login social (opcional). IDs gratuitos de Google / Facebook.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  sigat_mysql_data:
