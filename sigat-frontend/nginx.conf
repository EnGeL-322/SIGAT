server {
    listen 80;

    # ------------------------------------------------------------------
    # Cabeceras de seguridad globales
    #   Se heredan en las location que NO definen su propio add_header.
    #   (En nginx, declarar add_header dentro de una location REEMPLAZA
    #    todos los add_header heredados, por eso se repiten mas abajo.)
    # ------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;          # evita clickjacking (iframes)
    add_header X-Content-Type-Options "nosniff" always;      # evita MIME sniffing
    add_header Referrer-Policy "no-referrer" always;         # no filtra la URL a terceros
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy de la API al backend
    location /api/ {
        proxy_pass http://backend:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ------------------------------------------------------------------
    # Assets con hash de contenido (main-XXXX.js, styles-XXXX.css, ...).
    #   Son inmutables: se pueden cachear un anio sin riesgo.
    # ------------------------------------------------------------------
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico)$ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ------------------------------------------------------------------
    # SPA: index.html y todas las rutas de Angular.
    #   Cache-Control: no-store  ->  el navegador NO guarda el documento,
    #   lo que DESACTIVA el bfcache. Al presionar "atras" tras cerrar
    #   sesion, el navegador esta OBLIGADO a recargar, Angular arranca de
    #   nuevo, corre el AuthGuard y redirige a /login.
    # ------------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }
}
