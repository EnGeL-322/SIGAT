<header class="topbar">
  <button
    class="topbar-left menu-trigger"
    type="button"
    [attr.aria-expanded]="menuOpen"
    aria-controls="sigat-sidebar"
    aria-label="Mostrar u ocultar menu lateral"
    (click)="menuToggle.emit()"
  >
    <span class="menu-icon" aria-hidden="true">
      <span class="menu-bars"></span>
    </span>

    <span class="brand-copy">
      <span>Panel SIGAT</span>
      <small>{{ menuOpen ? 'Ocultar menu' : 'Mostrar menu' }}</small>
    </span>
  </button>

  <div class="topbar-center">
    <input
      type="text"
      placeholder="Buscar modulo del menu"
      autocomplete="off"
      [(ngModel)]="searchTerm"
      (focus)="searchFocused = true"
      (blur)="closeSearchLater()"
      (keydown.enter)="searchMenu()"
      aria-label="Buscar modulo del menu lateral"
    >
    <button class="search-action" type="button" (click)="searchMenu()" aria-label="Buscar modulo">
      <span class="search-icon" aria-hidden="true"></span>
    </button>

    <div class="search-results" *ngIf="searchFocused && searchTerm.trim().length > 1">
      <button
        type="button"
        class="search-result"
        *ngFor="let item of filteredMenuItems"
        (mousedown)="goTo(item)"
      >
        <small>{{ item.group }}</small>
        <span>{{ item.label }}</span>
      </button>

      <div class="search-empty" *ngIf="filteredMenuItems.length === 0">
        No encontre ese modulo
      </div>
    </div>
  </div>

  <div class="topbar-right">
    <img src="/assets/images/logo-sigat.png" alt="SIGAT">
  </div>
</header>
