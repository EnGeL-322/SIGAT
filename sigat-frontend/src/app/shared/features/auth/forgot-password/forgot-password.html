<div class="auth-page">
  <div class="auth-overlay">
    <a class="back-btn" routerLink="/login">Atras</a>
    <img class="logo" src="/assets/images/logo-sigat.png" alt="SIGAT">

    <div class="auth-card">
      <h1>RECUPERAR</h1>

      <form *ngIf="step === 'email'" [formGroup]="emailForm" (ngSubmit)="sendCode()">
        <p class="helper">Ingresa tu correo y te enviaremos un codigo unico.</p>
        <input type="email" formControlName="email" placeholder="CORREO ELECTRONICO">

        <button type="submit" [disabled]="loading">
          {{ loading ? 'ENVIANDO...' : 'ENVIAR CODIGO' }}
        </button>
      </form>

      <form *ngIf="step === 'reset'" [formGroup]="resetForm" (ngSubmit)="resetPassword()">
        <p class="helper">Escribe el codigo recibido y tu nueva contrasena.</p>
        <input type="text" formControlName="code" maxlength="6" placeholder="CODIGO DE 6 DIGITOS">
        <input type="password" formControlName="newPassword" placeholder="NUEVA CONTRASENA">
        <input type="password" formControlName="confirmPassword" placeholder="CONFIRMAR CONTRASENA">

        <button type="submit" [disabled]="loading">
          {{ loading ? 'ACTUALIZANDO...' : 'ACTUALIZAR CONTRASENA' }}
        </button>
      </form>

      <p class="error" *ngIf="error">{{ error }}</p>
      <p class="success" *ngIf="success">{{ success }}</p>
    </div>
  </div>
</div>
