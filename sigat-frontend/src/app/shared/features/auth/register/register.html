<div class="auth-page">
  <div class="auth-overlay">
    <a class="back-btn" routerLink="/login">Atras</a>
    <img class="logo" src="/assets/images/logo-sigat.png" alt="SIGAT">

    <div class="auth-card register-card">
      <h1>REGISTRARSE</h1>

      <div class="socials">
        <button
          class="circle google"
          type="button"
          [disabled]="!googleConfigured"
          (click)="onGoogleRegister()"
          [title]="googleConfigured ? 'Registrarse con Google' : 'Google aun no esta configurado'"
          aria-label="Registrarse con Google"
        >
          G
        </button>
        <button
          class="circle facebook"
          type="button"
          [disabled]="!facebookConfigured"
          (click)="onFacebookRegister()"
          [title]="facebookConfigured ? 'Registrarse con Facebook' : 'Facebook aun no esta configurado'"
          aria-label="Registrarse con Facebook"
        >
          f
        </button>
        <div class="circle xbrand" title="X aun no esta disponible">X</div>
      </div>

      <p class="google-help" *ngIf="googleConfigLoaded && !googleConfigured && !facebookConfigured">
        Google y Facebook aun no estan configurados. Puedes registrarte con tu correo.
      </p>

      <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
        <div class="two-cols">
          <input type="text" formControlName="nombre" placeholder="NOMBRES">
          <input type="text" formControlName="apellido" placeholder="APELLIDOS">
        </div>

        <input type="email" formControlName="email" placeholder="CORREO ELECTRONICO">
        <input type="password" formControlName="password" placeholder="CONTRASENA">
        <input type="password" formControlName="confirmPassword" placeholder="CONFIRMAR CONTRASENA">

        <button type="submit" [disabled]="loading">
          {{ loading ? 'REGISTRANDO...' : 'REGISTRARSE' }}
        </button>

        <p class="error" *ngIf="error">{{ error }}</p>
        <p class="success" *ngIf="success">{{ success }}</p>
      </form>
    </div>
  </div>
</div>
