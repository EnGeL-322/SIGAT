
# Server Configuration
server.port=8080
server.servlet.context-path=/api

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/sigat_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.sigat=DEBUG
logging.level.org.springframework.security=DEBUG

# Application Name
spring.application.name=SIGAT

# JWT Secret Key (cambiar en producción)
app.jwtSecret=sigatSecurityKeyForJWTToken12345678901234567890
app.jwtExpirationMs=86400000

# CORS Configuration
cors.allowedOrigins=http://localhost:4200
cors.allowedMethods=*
cors.allowedHeaders=*
cors.allowCredentials=true