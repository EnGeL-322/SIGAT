# Server Configuration
server.port=8081
server.servlet.context-path=/api

# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sigat_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.sigat=DEBUG
logging.level.org.springframework.security=DEBUG

# Application Name
spring.application.name=SIGAT

# JWT Secret Key (change in production)
app.jwtSecret=sigatSecurityKeyForJWTToken12345678901234567890
app.jwtExpirationMs=86400000

# Google login. OAuth Web Client ID (gratis en Google Cloud Console).
app.googleClientId=${GOOGLE_CLIENT_ID:}

# Facebook login. App ID y App Secret (gratis en developers.facebook.com).
app.facebookAppId=${FACEBOOK_APP_ID:}
app.facebookAppSecret=${FACEBOOK_APP_SECRET:}

# Password recovery email. For Gmail, use an app password, not your normal password.
# Si MAIL_USERNAME/MAIL_PASSWORD estan vacios, el codigo se muestra en los logs (modo gratis).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# CORS Configuration
cors.allowedOrigins=http://localhost:4200
cors.allowedMethods=*
cors.allowedHeaders=*
cors.allowCredentials=true
